services:
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: mc ready local
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - datalake-net

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/warehouse
      "
    networks:
      - datalake-net

  mysql:
    image: mysql:9
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: metastore
      MYSQL_USER: hive
      MYSQL_PASSWORD: hive
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: mysqladmin ping -h localhost -u root -proot
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - datalake-net

  hive-metastore:
    build: ./hive
    image: hive-datalake:4.1.0
    container_name: hive-metastore
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: mysql
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    volumes:
      - ./conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
    depends_on:
      mysql:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: bash -c "exec 3<>/dev/tcp/localhost/9083"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - datalake-net

  hiveserver2:
    build: ./hive
    image: hive-datalake:4.1.0
    container_name: hiveserver2
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    volumes:
      - ./conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
    depends_on:
      hive-metastore:
        condition: service_healthy
    healthcheck:
      test: beeline -u jdbc:hive2://localhost:10000 -e "select 1" || exit 1
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 90s
    networks:
      - datalake-net

volumes:
  minio-data:
  mysql-data:

networks:
  datalake-net:
    driver: bridge
